services:
  # ============================================================
  # INFRAESTRUCTURA BASE
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: turnos_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: turnos_reservas
    ports:
      - "5433:5432"  # Host 5433 → Container 5432 (evita conflicto con PostgreSQL local)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d turnos_reservas" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: turnos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: turnos_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI: http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # OBSERVABILIDAD — Jaeger + Prometheus + Grafana
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: turnos_jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI:      http://localhost:16686
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: turnos_prometheus
    ports:
      - "9090:9090" # Prometheus UI:  http://localhost:9090
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    container_name: turnos_grafana
    ports:
      - "3002:3000" # Grafana UI:     http://localhost:3002  (user: admin / pass: admin)
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ============================================================
  # MICROSERVICIOS
  # ============================================================
  appointments-service:
    build: ./services/appointments-service
    container_name: turnos_appointments
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://user:password@postgres:5432/turnos_reservas
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - ALLOWED_ORIGINS=http://localhost:3000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notifications-service:
    build: ./services/notifications-service
    container_name: turnos_notifications
    ports:
      - "3004:3004" # Health/Metrics: http://localhost:3004/health
    environment:
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - DATABASE_URL=postgres://user:password@postgres:5432/turnos_reservas
      - NODE_ENV=development
      - HEALTH_PORT=3004
      - TEST_EMAIL_RECIPIENT=ldiuchep@ucentral.edu.co
      # - RESEND_API_KEY=pon_tu_api_key_aqui
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  payments-service:
    build: ./services/payments-service
    container_name: turnos_payments
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - ALLOWED_ORIGINS=http://localhost:3000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - FRONTEND_URL=http://localhost:3000
      - WEBHOOK_BASE_URL=http://api-gateway:8080
      # Para integración REAL con dLocal Go sandbox
      #- DLOCAL_API_KEY=VsKiQKFuzVyEirJtYGoYpeTtXSuXLlEw
      #- DLOCAL_SECRET_KEY=23VBG4WKIt1Xv11VnWa8FjbtWWmRFAELbfzDSAPB
      # - DLOCAL_BASE_URL=https://api-sbx.dlocalgo.com
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: turnos_gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - APPOINTMENTS_SERVICE_URL=http://appointments-service:3001
      - PAYMENTS_SERVICE_URL=http://payments-service:3003
      - ALLOWED_ORIGINS=http://localhost:3000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - appointments-service
    restart: unless-stopped

  client-app:
    build: ./client-app
    container_name: turnos_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  grafana_data:
